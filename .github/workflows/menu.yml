name: KAIST 문지캠퍼스 식단 알림

on:
  schedule:
    - cron: "0 21 * * 0-4"
  workflow_dispatch:

jobs:
  send-menu:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests beautifulsoup4

      - name: 식단 크롤링 및 Discord 전송
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py
